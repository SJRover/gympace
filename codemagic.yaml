# Codemagic CI/CD Build Configuration for GymPace (iOS)
workflows:
  ios-capacitor:
    name: GymPace iOS App
    max_build_duration: 60
    instance_type: mac_mini_m1 # Fixed: valid Mac instance type
    integrations:
      app_store_connect: Personal # Matches your Personal integration name in Codemagic
    environment:
      node: latest
      xcode: latest
      groups:
        - app_store_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install Node Dependencies
        script: |
          npm install
      - name: Capacitor Sync
        script: |
          npx cap init GymPace com.gympace.tracker --web-dir=www
          npx cap add ios || true
          npx cap sync
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build IPA with Xcode
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-flags="-allowProvisioningUpdates" \
            --export-flags="-allowProvisioningUpdates"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
